<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Равлик та Яблуко</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --sw:       140px;   /* sidebar width — overridden by JS */
  --tile-sz:  56px;    /* tile & action btn size — synced to cell by JS */
  --tile-r:   10px;    /* border-radius */

  --bg:       #e8f2dc;
  --sidebar:  #f2fbea;
  --sbd:      #bcd9a0;

  --ca:       #b2d690;   /* cell light */
  --cb:       #99c475;   /* cell dark  */
  --chov:     #ffe070;
  --cdrop:    #ffc800;
  --gbd:      #52903a;
  --gap:      3px;

  /* Straight arrow tiles */
  --t-str:    #3a7d44;
  --t-str-h:  #2a5e30;
  --t-str-sh: #1a3d1e;

  /* Turn arrow tiles */
  --t-trn:    #1a6fc2;
  --t-trn-h:  #135298;
  --t-trn-sh: #0a2d5a;

  /* Selected state */
  --t-sel:    #d94d1a;
  --t-sel-sh: #6e220a;

  /* Action buttons */
  --run-bg:   #1a8a3c;
  --run-sh:   #0d4d20;
  --clr-bg:   #b82020;
  --clr-sh:   #5a0e0e;

  --placed-bg: #1a3d22;  /* dark green bg for placed arrows */
  --trail:     rgba(255,200,20,.35);
  --txt:       #162210;
  --muted:     #5a7848;

  --tr:        .15s ease;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--txt);
  display: flex;
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ════════════════════════════════
   SIDEBAR
════════════════════════════════ */
.sidebar {
  width: var(--sw);
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 2px solid var(--sbd);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0 14px;
  gap: 10px;
  box-shadow: 3px 0 18px rgba(0,0,0,.09);
  z-index: 10;
  overflow-y: auto;
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

/* Logo */
.logo {
  display: flex; flex-direction: column; align-items: center; gap: 1px; text-align: center;
  flex-shrink: 0;
}
.logo-ico  { font-size: clamp(1.6rem, 3vw, 2.2rem); line-height: 1; }
.logo-name { font-size: .72rem; font-weight: 800; color: var(--t-str); letter-spacing: .03em; }
.logo-sub  { font-size: .62rem; color: var(--muted); font-weight: 500; }

/* Section labels */
.sect-lbl {
  font-size: .6rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  opacity: .8;
}

/* Divider */
.div-line {
  width: 70%; height: 1px;
  background: var(--sbd);
  flex-shrink: 0;
}

/* Palette grid: 2 columns */
.palette {
  display: grid;
  grid-template-columns: repeat(2, var(--tile-sz));
  gap: 6px;
  flex-shrink: 0;
}

/* ── ARROW TILE ── */
.atile {
  width:  var(--tile-sz);
  height: var(--tile-sz);
  border: none;
  border-radius: var(--tile-r);
  cursor: grab;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
  touch-action: none;
  position: relative; top: 0;
  padding: 0;
  transition: filter var(--tr), transform var(--tr), box-shadow var(--tr);
  overflow: hidden;
  font-size: calc(var(--tile-sz) * .5);
  color: #fff;
}
.atile i {
  display: block;
  line-height: 1;
  pointer-events: none;
}

/* Straight — green */
.atile.str {
  background: var(--t-str);
  box-shadow: 0 4px 0 var(--t-str-sh), 0 5px 12px rgba(0,0,0,.2);
}
.atile.str:hover  { filter: brightness(1.12); transform: translateY(-2px); box-shadow: 0 6px 0 var(--t-str-sh), 0 8px 16px rgba(0,0,0,.22); }

/* Turn — blue */
.atile.trn {
  background: var(--t-trn);
  box-shadow: 0 4px 0 var(--t-trn-sh), 0 5px 12px rgba(0,0,0,.2);
}
.atile.trn:hover  { filter: brightness(1.12); transform: translateY(-2px); box-shadow: 0 6px 0 var(--t-trn-sh), 0 8px 16px rgba(0,0,0,.22); }

.atile:active, .atile.dragging {
  transform: translateY(2px) scale(.92) !important;
  filter: brightness(.9) !important;
  box-shadow: 0 1px 0 rgba(0,0,0,.4) !important;
  cursor: grabbing;
}
.atile:focus-visible { outline: 3px solid var(--t-sel); outline-offset: 3px; }
.atile.sel {
  filter: none !important;
  background: var(--t-sel) !important;
  box-shadow: 0 4px 0 var(--t-sel-sh), 0 6px 20px rgba(217,77,26,.55) !important;
  animation: tile-pulse .9s ease-in-out infinite alternate;
}
@keyframes tile-pulse {
  from { box-shadow: 0 4px 0 var(--t-sel-sh), 0 5px 12px rgba(217,77,26,.4); }
  to   { box-shadow: 0 4px 0 var(--t-sel-sh), 0 5px 26px rgba(217,77,26,.8); }
}

/* ── ACTION BUTTONS (square icon-only) ── */
.actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.icon-btn {
  width:  var(--tile-sz);
  height: var(--tile-sz);
  border: none;
  border-radius: var(--tile-r);
  font-size: calc(var(--tile-sz) * .42);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: filter var(--tr), transform var(--tr);
  touch-action: manipulation;
  position: relative; top: 0;
}
.icon-btn:focus-visible { outline: 3px solid #ff9800; outline-offset: 3px; }
.icon-btn:active { transform: scale(.92) translateY(2px) !important; }
.icon-btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-run {
  background: var(--run-bg); color: #fff;
  box-shadow: 0 4px 0 var(--run-sh), 0 5px 14px rgba(26,138,60,.28);
}
.btn-run:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 0 var(--run-sh), 0 8px 18px rgba(26,138,60,.3); }

.btn-clr {
  background: var(--clr-bg); color: #fff;
  box-shadow: 0 4px 0 var(--clr-sh), 0 5px 12px rgba(184,32,32,.24);
}
.btn-clr:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-2px); }

/* ════════════════════════════════
   GRID AREA
════════════════════════════════ */
.grid-area {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 16px;
  overflow: hidden; min-width: 0;
}

/* Always-8×6 grid wrapper */
.gwrap {
  position: relative; line-height: 0;
  --aw: calc(100vw - var(--sw) - 32px);
  --ah: calc(100dvh - 56px);
  /* fit 8:6 (4:3) rect inside available space */
  --by-w: var(--aw);
  --by-h: calc(var(--ah) * 8 / 6);
  --gs-w: min(var(--aw), calc(var(--ah) * 8 / 6));
  --gs-h: calc(var(--gs-w) * 6 / 8);
  width:  var(--gs-w);
  height: var(--gs-h);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 8px 36px rgba(0,0,0,.18), 0 0 0 3px var(--gbd);
}

/* 8×8 grid */
#grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows:    repeat(6, 1fr);
  width: 100%; height: 100%;
  gap: var(--gap); background: var(--gbd); padding: var(--gap);
}

/* ── CELL ── */
.cell {
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: background var(--tr), transform var(--tr);
  -webkit-tap-highlight-color: transparent;
}
.cell.odd  { background: var(--ca); }
.cell.even { background: var(--cb); }
.cell:hover { background: var(--chov) !important; }
.cell.drop  {
  background: var(--cdrop) !important;
  transform: scale(1.07); z-index: 2;
  box-shadow: inset 0 0 0 3px rgba(0,0,0,.2);
}
.cell.trail { background: var(--trail) !important; }
.cell:focus-visible { outline: 3px solid #ff9800; outline-offset: -3px; z-index: 3; }

/* Apple */
.cell-apple {
  font-size: clamp(1rem, 2.5vw, 1.9rem);
  animation: bob 1.9s ease-in-out infinite;
  pointer-events: none; user-select: none;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10%)} }

/* Placed arrow block */
.cell-arrow {
  position: absolute; inset: 3px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  animation: plop .18s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.3);
  font-size: calc(var(--tile-sz) * .42);
  color: #fff;
}
.cell-arrow i { display: block; line-height: 1; pointer-events: none; }
.cell-arrow.str-placed { background: var(--placed-bg); }
.cell-arrow.trn-placed { background: #0e2d5a; }

@keyframes plop { from{transform:scale(.25);opacity:0} to{transform:scale(1);opacity:1} }

/* ── SNAIL OVERLAY ── */
#snail {
  position: absolute; top: 0; left: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 20;
  transition: transform .30s cubic-bezier(.4,0,.2,1);
  filter: drop-shadow(0 2px 5px rgba(0,0,0,.3));
  line-height: 1;
}

/* ════════════════════════════════
   STATUS BAR
════════════════════════════════ */
#status {
  height: 36px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  border-radius: 10px; padding: 0 20px;
  font-size: clamp(.74rem, 1.6vw, .92rem); font-weight: 600;
  width: 100%; max-width: calc(var(--gs-w, 600px));
  transition: background .2s, color .2s;
  background: rgba(255,255,255,.5); color: var(--muted);
}
#status.ok   { background: #d0f4da; color: #145520; }
#status.err  { background: #fde8e4; color: #8a1818; }
#status.run  { background: #fff4d4; color: #664000; }
#status.warn { background: #fff3cd; color: #6a4800; }

/* ════════════════════════════════
   DRAG GHOST
════════════════════════════════ */
#ghost {
  position: fixed; top: -120px; left: -120px;
  width: var(--tile-sz); height: var(--tile-sz);
  border-radius: var(--tile-r);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 9999;
  opacity: 0;
  box-shadow: 0 12px 32px rgba(0,0,0,.45);
  transition: opacity .08s;
  transform: rotate(-9deg) scale(1.1);
  will-change: left, top;
  overflow: hidden;
  font-size: calc(var(--tile-sz) * .5);
  color: #fff;
}
#ghost.show { opacity: 1; }
#ghost i { display: block; line-height: 1; }

/* ════════════════════════════════
   CONFETTI
════════════════════════════════ */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9998; overflow: hidden; }
.cp { position: absolute; top: -14px; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(900deg); opacity: 0; } }

/* ════════════════════════════════
   MODAL
════════════════════════════════ */
.mbd {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; animation: mfade .18s ease;
}
@keyframes mfade { from{opacity:0} to{opacity:1} }
.mbox {
  background: #fff; border-radius: 22px; padding: 36px 32px;
  max-width: 300px; width: 90%; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  box-shadow: 0 18px 52px rgba(0,0,0,.28);
  animation: mpop .32s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes mpop { from{transform:scale(.45);opacity:0} to{transform:scale(1);opacity:1} }
.mico { font-size: 3.5rem; line-height: 1; }
.mttl { font-size: 1.4rem; font-weight: 900; color: #145520; }
.mbdy { font-size: .88rem; color: #527048; }
.mok  {
  background: var(--run-bg); color: #fff; border: none;
  border-radius: 12px; padding: 12px 36px;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  min-height: 48px; min-width: 160px;
  box-shadow: 0 4px 0 var(--run-sh);
  transition: filter .14s, transform .14s;
}
.mok:hover { filter: brightness(1.1); transform: translateY(-2px); }
.mok:focus-visible { outline: 3px solid #ff9800; outline-offset: 3px; }

/* ════════════════════════════════
   MOBILE
════════════════════════════════ */
@media (max-width: 620px) {
  body { flex-direction: column; overflow: auto; }
  .sidebar {
    width: 100%; height: auto; flex-direction: row; flex-wrap: wrap;
    border-right: none; border-bottom: 2px solid var(--sbd);
    padding: 8px 10px; gap: 8px;
    justify-content: space-between; align-items: center;
    overflow-y: visible;
  }
  .logo { flex-direction: row; gap: 6px; }
  .sect-lbl, .div-line { display: none; }
  .palette { gap: 5px; }
  .actions { flex-direction: row; }
  .grid-area { padding: 8px 8px 6px; flex: 1; overflow: hidden; }
  .gwrap { --aw: calc(100vw - 16px); --ah: calc(100dvh - 200px); }
}
</style>
</head>
<body>

<aside class="sidebar" aria-label="Панель інструментів">

  <div class="logo" aria-label="Рівавлик та яблуко — гра з алгоритмами">
    <span class="logo-ico" aria-hidden="true">🐌</span>
    <div><div class="logo-name">Равлик</div><div class="logo-sub">та яблуко</div></div>
  </div>

  <span class="sect-lbl" aria-hidden="true">прямо</span>

  <!-- Palette built by JS -->
  <div class="palette" id="palette" role="group" aria-label="Команди для рівавлика"></div>

  <div class="div-line" aria-hidden="true"></div>

  <!-- Square icon-only buttons -->
  <div class="actions">
    <button class="icon-btn btn-run" id="btn-run" aria-label="Запустити алгоритм" title="Запустити">▶</button>
    <button class="icon-btn btn-clr" id="btn-clr" aria-label="Очистити поле"     title="Очистити">✕</button>
  </div>

</aside>

<main class="grid-area" aria-label="Ігрове поле 8×6">
  <div class="gwrap" id="gwrap">
    <div id="grid" role="grid"
      aria-label="Поле 8×6. Тягни команди на клітинки, щоб прокласти маршрут.">
    </div>
    <div id="snail" aria-hidden="true">🐌</div>
  </div>
  <div id="status" role="status" aria-live="polite" aria-atomic="true">
    <span id="sico" aria-hidden="true">💡</span>
    <span id="stxt">Тягни команди на поле — рівавлик піде по них!</span>
  </div>
</main>

<div id="ghost"    aria-hidden="true"></div>
<div id="confetti" aria-hidden="true"></div>

<script>
/* ════════════════════════════════════════════════════
   TILE DEFINITIONS — Font Awesome 6 icons
   ─────────────────────────────────────────────────
   Straight arrows: fa-arrow-up/right/down/left
   Turn arrows: fa-turn-up / fa-turn-down + CSS rotation
   
   Rotation logic (verified):
     fa-turn-up (↱ shape — arrowhead points UP, tail from right):
       rotate(0°)   → right-up   (coming right, exit up)
       rotate(90°)  → down-right (coming down, exit right)
       rotate(180°) → left-down  (coming left, exit down)
       rotate(270°) → up-left    (coming up, exit left)
     
     fa-turn-down (↳ shape — arrowhead points DOWN, tail from right):
       rotate(0°)   → right-down  (coming right, exit down)
       rotate(90°)  → down-left   (coming down, exit left)
       rotate(180°) → left-up     (coming left, exit up)
       rotate(270°) → up-right    (coming up, exit right)
════════════════════════════════════════════════════ */

/* Build icon HTML for a tile */
function tileIcon(faClass, rotateDeg = 0) {
  const style = rotateDeg ? `style="transform:rotate(${rotateDeg}deg)"` : '';
  return `<i class="fa-solid ${faClass}" ${style}></i>`;
}

/* All 12 tile definitions */
const TILE_DEFS = [
  /* ── Straight (green) ── */
  { dir:'up',         group:'str', label:'Вгору',                    icon: tileIcon('fa-arrow-up')          },
  { dir:'right',      group:'str', label:'Вправо',                   icon: tileIcon('fa-arrow-right')       },
  { dir:'down',       group:'str', label:'Вниз',                     icon: tileIcon('fa-arrow-down')        },
  { dir:'left',       group:'str', label:'Вліво',                    icon: tileIcon('fa-arrow-left')        },
  /* ── Turns (blue) — fa-turn-up rotations ── */
  { dir:'right-up',   group:'trn', label:'Поворот вправо → вгору',   icon: tileIcon('fa-turn-up',    0)     },
  { dir:'down-right', group:'trn', label:'Поворот вниз → вправо',    icon: tileIcon('fa-turn-up',   90)     },
  { dir:'left-down',  group:'trn', label:'Поворот вліво → вниз',     icon: tileIcon('fa-turn-up',  180)     },
  { dir:'up-left',    group:'trn', label:'Поворот вгору → вліво',    icon: tileIcon('fa-turn-up',  270)     },
  /* ── Turns (blue) — fa-turn-down rotations ── */
  { dir:'right-down', group:'trn', label:'Поворот вправо → вниз',    icon: tileIcon('fa-turn-down',  0)     },
  { dir:'down-left',  group:'trn', label:'Поворот вниз → вліво',     icon: tileIcon('fa-turn-down', 90)     },
  { dir:'left-up',    group:'trn', label:'Поворот вліво → вгору',    icon: tileIcon('fa-turn-down', 180)    },
  { dir:'up-right',   group:'trn', label:'Поворот вгору → вправо',   icon: tileIcon('fa-turn-down', 270)    },
];

/* Direction → exit direction (for placed tiles) */
function exitDir(d) {
  // straight: same; turn 'from-to': take 'to'
  return d.includes('-') ? d.split('-')[1] : d;
}

/* Direction delta */
const DELTA = {
  up:    { dr:-1, dc: 0 },
  down:  { dr: 1, dc: 0 },
  left:  { dr: 0, dc:-1 },
  right: { dr: 0, dc: 1 },
};

/* ════════════════════════════════════════════════════
   GAME STATE
════════════════════════════════════════════════════ */
const ROWS = 6, COLS = 8;
const START = { r:5, c:0 };
const APPLE = { r:0, c:6 };
const STEP_MS   = 320;
const MAX_STEPS = 80;
const SCAN_ORDER = ['right','up','down','left'];

let arrows    = {};
let snailPos  = { ...START };
let running   = false;
let selDir    = null;
let dragDir   = null;
let touchDir  = null;
let touchCell = null;

/* ════════════════════════════════════════════════════
   DOM REFS
════════════════════════════════════════════════════ */
const gridEl    = document.getElementById('grid');
const gwrap     = document.getElementById('gwrap');
const snailEl   = document.getElementById('snail');
const statusEl  = document.getElementById('status');
const sicoEl    = document.getElementById('sico');
const stxtEl    = document.getElementById('stxt');
const btnRun    = document.getElementById('btn-run');
const btnClr    = document.getElementById('btn-clr');
const ghostEl   = document.getElementById('ghost');
const confEl    = document.getElementById('confetti');
const paletteEl = document.getElementById('palette');

/* ════════════════════════════════════════════════════
   BUILD PALETTE
════════════════════════════════════════════════════ */
function buildPalette() {
  paletteEl.innerHTML = '';
  TILE_DEFS.forEach(({ dir, group, label, icon }) => {
    const btn = document.createElement('button');
    btn.className = `atile ${group}`;
    btn.dataset.dir = dir;
    btn.dataset.group = group;
    btn.setAttribute('draggable', 'true');
    btn.setAttribute('aria-label', label + ' — перетягни на поле');
    btn.innerHTML = icon;

    /* Mouse drag */
    btn.addEventListener('dragstart', e => {
      if (running) { e.preventDefault(); return; }
      dragDir = dir;
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', dir);
      const blank = document.createElement('canvas');
      blank.width = blank.height = 1;
      e.dataTransfer.setDragImage(blank, 0, 0);
      btn.classList.add('dragging');
      showGhost(dir, group, icon);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      hideGhost();
      dragDir = null;
    });

    /* Click-to-select */
    btn.addEventListener('click', () => {
      if (running) return;
      if (selDir === dir) {
        deselect();
      } else {
        selDir = dir;
        document.querySelectorAll('.atile').forEach(t => t.classList.remove('sel'));
        btn.classList.add('sel');
      }
    });

    /* Touch drag */
    btn.addEventListener('touchstart', e => {
      if (running) return;
      touchDir = dir;
      const t = e.touches[0];
      showGhost(dir, group, icon);
      moveGhost(t.clientX, t.clientY);
    }, { passive: true });

    paletteEl.appendChild(btn);
  });
}

/* ════════════════════════════════════════════════════
   GHOST
════════════════════════════════════════════════════ */
function showGhost(dir, group, icon) {
  ghostEl.innerHTML = icon;
  ghostEl.style.background = group === 'trn' ? 'var(--t-trn)' : 'var(--t-str)';
  ghostEl.classList.add('show');
}
function hideGhost() { ghostEl.classList.remove('show'); }
function moveGhost(x, y) {
  const sz = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tile-sz')) || 56;
  ghostEl.style.left = (x - sz / 2) + 'px';
  ghostEl.style.top  = (y - sz / 2 - 8) + 'px';
}

/* Mouse follow */
document.addEventListener('mousemove', e => {
  if (!dragDir) return;
  moveGhost(e.clientX, e.clientY);
});

/* Touch move */
document.addEventListener('touchmove', e => {
  if (!touchDir) return;
  e.preventDefault();
  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);
  ghostEl.style.pointerEvents = 'none';
  const under = document.elementFromPoint(t.clientX, t.clientY)?.closest?.('.cell') || null;
  ghostEl.style.pointerEvents = '';
  if (touchCell && touchCell !== under) touchCell.classList.remove('drop');
  if (under) under.classList.add('drop');
  touchCell = under;
}, { passive: false });

/* Touch end */
document.addEventListener('touchend', () => {
  if (!touchDir) return;
  hideGhost();
  if (touchCell) {
    touchCell.classList.remove('drop');
    const r = +touchCell.dataset.r, c = +touchCell.dataset.c;
    if (!isNaN(r) && !isNaN(c)) placeArrow(r, c, touchDir);
    touchCell = null;
  }
  touchDir = null;
}, { passive: true });

/* ════════════════════════════════════════════════════
   BUILD GRID
════════════════════════════════════════════════════ */
function buildGrid() {
  gridEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'cell ' + ((r + c) % 2 === 0 ? 'odd' : 'even');
      el.setAttribute('role', 'gridcell');
      el.setAttribute('tabindex', '0');
      el.dataset.r = r; el.dataset.c = c;
      el.addEventListener('dragover',  cellDragOver);
      el.addEventListener('dragleave', cellDragLeave);
      el.addEventListener('drop',      cellDrop);
      el.addEventListener('click',     () => cellClick(r, c));
      el.addEventListener('keydown',   e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cellClick(r, c); }
      });
      gridEl.appendChild(el);
    }
  }
}

function cellEl(r, c) { return gridEl.querySelector(`[data-r="${r}"][data-c="${c}"]`); }

/* ════════════════════════════════════════════════════
   RENDER CELL
════════════════════════════════════════════════════ */
function renderCell(r, c) {
  const el = cellEl(r, c);
  if (!el) return;
  el.innerHTML = '';
  const key     = `${r},${c}`;
  const isApple = r === APPLE.r && c === APPLE.c;
  const isStart = r === START.r && c === START.c;
  const def     = arrows[key] ? TILE_DEFS.find(d => d.dir === arrows[key]) : null;

  if (isApple) {
    const a = document.createElement('span');
    a.className = 'cell-apple'; a.textContent = '🍎';
    a.setAttribute('aria-hidden','true');
    el.appendChild(a);
  }

  if (def && !isApple) {
    const ar = document.createElement('div');
    ar.className = `cell-arrow ${def.group}-placed`;
    ar.innerHTML = def.icon;
    ar.setAttribute('aria-hidden', 'true');
    el.appendChild(ar);
  }

  // ARIA
  let lbl = `Рядок ${r+1}, стовпець ${c+1}`;
  if (def)     lbl += `. ${def.label}. Клік — видалити`;
  if (isApple) lbl += '. Яблуко — ціль';
  if (isStart) lbl += '. Рівавлик стартує тут';
  el.setAttribute('aria-label', lbl);
}

function renderAll() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) renderCell(r, c);
}

/* ════════════════════════════════════════════════════
   PLACE / REMOVE ARROWS
════════════════════════════════════════════════════ */
function placeArrow(r, c, dir) {
  if (running) return;
  if (r === APPLE.r && c === APPLE.c) return;
  if (r === START.r && c === START.c) return;   // snail start — no arrow
  arrows[`${r},${c}`] = dir;
  renderCell(r, c);
}

function removeArrow(r, c) {
  if (running) return;
  delete arrows[`${r},${c}`];
  renderCell(r, c);
}

/* ════════════════════════════════════════════════════
   CELL INTERACTIONS
════════════════════════════════════════════════════ */
function cellClick(r, c) {
  if (running) return;
  if (selDir) {
    placeArrow(r, c, selDir);
  } else if (arrows[`${r},${c}`]) {
    removeArrow(r, c);
  }
}

function cellDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; this.classList.add('drop'); }
function cellDragLeave()  { this.classList.remove('drop'); }
function cellDrop(e) {
  e.preventDefault();
  this.classList.remove('drop');
  const dir = e.dataTransfer.getData('text/plain') || dragDir;
  if (dir) placeArrow(+this.dataset.r, +this.dataset.c, dir);
}

/* ════════════════════════════════════════════════════
   DESELECT
════════════════════════════════════════════════════ */
function deselect() {
  selDir = null;
  document.querySelectorAll('.atile').forEach(t => t.classList.remove('sel'));
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') deselect(); });
/* Click on empty space outside palette deselects */
document.addEventListener('click', e => {
  if (!e.target.closest('.atile') && !e.target.closest('.cell')) deselect();
});

/* ════════════════════════════════════════════════════
   SNAIL POSITION
════════════════════════════════════════════════════ */
function posSnail(r, c, animate = true) {
  const el = cellEl(r, c);
  if (!el) return;
  const wr = gwrap.getBoundingClientRect();
  const cr = el.getBoundingClientRect();
  snailEl.style.width    = cr.width  + 'px';
  snailEl.style.height   = cr.height + 'px';
  snailEl.style.fontSize = Math.round(Math.min(cr.width, cr.height) * 0.64) + 'px';
  const x = cr.left - wr.left, y = cr.top - wr.top;
  if (!animate) {
    snailEl.style.transition = 'none';
    snailEl.style.transform  = `translate(${x}px,${y}px)`;
    snailEl.getBoundingClientRect();
    snailEl.style.transition = '';
  } else {
    snailEl.style.transform = `translate(${x}px,${y}px)`;
  }
}

/* ════════════════════════════════════════════════════
   TRAIL
════════════════════════════════════════════════════ */
function setTrail(r, c)  { cellEl(r,c)?.classList.add('trail'); }
function clearTrail()    { document.querySelectorAll('.cell.trail').forEach(e=>e.classList.remove('trail')); }

/* ════════════════════════════════════════════════════
   STATUS
════════════════════════════════════════════════════ */
function setStatus(ico, txt, type='') {
  sicoEl.textContent = ico; stxtEl.textContent = txt; statusEl.className = type;
}
function clearStatus() { setStatus('💡','Тягни команди на поле — рівавлик піде по них!',''); }

/* ════════════════════════════════════════════════════
   DISABLE
════════════════════════════════════════════════════ */
function setDisabled(d) {
  document.querySelectorAll('.atile').forEach(b => b.disabled = d);
  btnRun.disabled = d; btnClr.disabled = d;
}

/* ════════════════════════════════════════════════════
   FLASH CELL
════════════════════════════════════════════════════ */
function flashCell(r, c, color='#ff9800') {
  const el = cellEl(r, c);
  if (!el) return;
  el.style.outline = `4px solid ${color}`;
  el.style.outlineOffset = '-4px';
  setTimeout(()=>{ el.style.outline=''; el.style.outlineOffset=''; }, 1200);
}
function flashNeighbours(r, c) {
  Object.values(DELTA).forEach(({dr,dc}) => {
    const nr=r+dr, nc=c+dc;
    if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) flashCell(nr,nc,'#ff9800');
  });
}

/* ════════════════════════════════════════════════════
   RUN ALGORITHM
   ─────────────────────────────────────────────────
   Mechanic (like Coding Safari / Code-a-Pillar):
   • Snail starts at START — no arrow on start cell.
   • Step 0: scan 4 neighbours, pick the first one
     that has an arrow tile placed on it.
   • Each subsequent step: read arrow on current cell,
     apply exitDir() → compute next cell, move there.
   • Turn tiles: snail lands on cell, reads the tile's
     exit direction (e.g. 'right-up' → exits 'up').
   • Win: land on apple cell.
════════════════════════════════════════════════════ */
async function run() {
  if (running) return;
  if (Object.keys(arrows).length === 0) {
    setStatus('🤔','Спочатку постав команди на поле!','warn');
    return;
  }

  clearTrail();
  snailPos = { ...START };
  posSnail(snailPos.r, snailPos.c, false);
  renderAll();

  running = true;
  setDisabled(true);
  deselect();
  setStatus('🐌','Рухаємось…','run');

  let steps = 0;
  let firstStep = true;
  const visited = new Set();

  while (steps < MAX_STEPS) {
    steps++;
    const { r, c } = snailPos;
    const key = `${r},${c}`;
    let dir;

    if (firstStep) {
      /* Scan neighbours for first arrow */
      firstStep = false;
      dir = null;
      for (const d of SCAN_ORDER) {
        const { dr, dc } = DELTA[d];
        const nr = r+dr, nc = c+dc;
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS && arrows[`${nr},${nc}`]) {
          dir = d; break;
        }
      }
      if (!dir) {
        setStatus('🤔','Постав команду поруч із рівавликом!','warn');
        flashNeighbours(r, c);
        running = false; setDisabled(false); return;
      }
    } else {
      /* Read arrow on current cell */
      dir = arrows[key] ? exitDir(arrows[key]) : null;
      if (!dir) {
        setStatus('🤔','Немає команди — рівавлик зупинився!','err');
        flashCell(r, c, '#d94d1a');
        break;
      }
      /* Loop check */
      if (visited.has(key)) {
        setStatus('😵','Рівавлик ходить по колу! Перевір маршрут.','err');
        break;
      }
      visited.add(key);
    }

    const { dr, dc } = DELTA[dir];
    const nr = r+dr, nc = c+dc;
    if (nr<0||nr>=ROWS||nc<0||nc>=COLS) {
      setStatus('😬','Рівавлик виходить за межі поля!','err');
      break;
    }

    setTrail(r, c);
    snailPos = { r:nr, c:nc };
    posSnail(nr, nc, true);

    if (nr===APPLE.r && nc===APPLE.c) {
      await delay(STEP_MS * .8);
      setStatus('🏆','Рівавлик знайшов яблуко! Чудово!','ok');
      launchConfetti();
      setTimeout(showWin, 500);
      running = false; setDisabled(false); return;
    }
    await delay(STEP_MS);
  }

  if (steps >= MAX_STEPS) setStatus('😵','Забагато кроків — перевір маршрут.','err');
  running = false; setDisabled(false);
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ════════════════════════════════════════════════════
   CLEAR
════════════════════════════════════════════════════ */
function clearAll() {
  if (running) return;
  arrows = {}; clearTrail();
  snailPos = { ...START };
  posSnail(snailPos.r, snailPos.c, false);
  deselect(); renderAll(); clearStatus();
}

/* ════════════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════════════ */
function launchConfetti() {
  const cols = ['#3a7d44','#e8623a','#f5c842','#5b9cf6','#e86fa3','#a3d977','#ff9966','#1a6fc2'];
  confEl.innerHTML = '';
  for (let i=0;i<75;i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}vw;background:${cols[i%cols.length]};
      width:${6+Math.random()*9}px;height:${10+Math.random()*12}px;
      border-radius:${Math.random()>.5?'50%':'3px'};
      transform:rotate(${Math.random()*360}deg);
      animation-duration:${1.1+Math.random()*1.9}s;
      animation-delay:${Math.random()*.5}s;opacity:.9`;
    confEl.appendChild(p);
  }
  setTimeout(()=>confEl.innerHTML='',4500);
}

/* ════════════════════════════════════════════════════
   WIN MODAL
════════════════════════════════════════════════════ */
function showWin() {
  const n = Object.keys(arrows).length;
  const bd = document.createElement('div');
  bd.className='mbd'; bd.setAttribute('role','dialog');
  bd.setAttribute('aria-modal','true'); bd.setAttribute('aria-labelledby','mtit');
  bd.innerHTML=`<div class="mbox">
    <div class="mico" aria-hidden="true">🎉</div>
    <h2 class="mttl" id="mtit">Рівень пройдено!</h2>
    <p class="mbdy">Рівавлик знайшов яблуко!<br>Використано <strong>${n}</strong> команд.</p>
    <button class="mok" id="mok">Грати ще раз</button>
  </div>`;
  document.body.appendChild(bd);
  const ok = bd.querySelector('#mok'); ok.focus();
  ok.addEventListener('click',()=>{ bd.remove(); clearAll(); });
  bd.addEventListener('keydown',e=>{ if(e.key==='Escape')ok.click(); if(e.key==='Tab'){e.preventDefault();ok.focus();} });
  bd.addEventListener('click',e=>{ if(e.target===bd)ok.click(); });
}

/* ════════════════════════════════════════════════════
   SYNC TILE SIZE to grid cell size
════════════════════════════════════════════════════ */
let syncTimeout = null;
function syncSizes() {
  const c0 = cellEl(0,0);
  if (!c0) return;
  const cr = c0.getBoundingClientRect();
  // Use the smaller dimension (height) so tile fits on cell in both axes
  const sz = Math.min(Math.round(Math.min(cr.width, cr.height)), 80);
  if (sz < 12) return;
  const root = document.documentElement;
  root.style.setProperty('--tile-sz', sz + 'px');
  root.style.setProperty('--sw',      (2 * sz + 20) + 'px');
  requestAnimationFrame(() => posSnail(snailPos.r, snailPos.c, false));
}
window.addEventListener('resize', () => {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(()=>{ syncSizes(); posSnail(snailPos.r,snailPos.c,false); }, 80);
});

/* ════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════ */
btnRun.addEventListener('click', run);
btnClr.addEventListener('click', clearAll);

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
buildPalette();
buildGrid();
renderAll();

/* Two-frame delay so CSS layout is stable before measuring */
requestAnimationFrame(() => requestAnimationFrame(() => {
  syncSizes();
  posSnail(START.r, START.c, false);
}));
</script>
</body>
</html>
