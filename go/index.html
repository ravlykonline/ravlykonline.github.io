<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пригоди Равлика</title>
<meta name="theme-color" content="#e8f2dc">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="ravlyk.png" sizes="any">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/game.css">
</head>
<body>
<a class="skip-link" href="#main-content">Перейти до поля гри</a>
<aside class="sidebar" aria-label="Панель інструментів">
  <div class="logo" aria-label="Пригоди Равлика - гра з алгоритмами.">
    <img class="logo-ico-img" src="ravlyk.png" alt="" aria-hidden="true">
    <div>
      <div class="logo-name">Пригоди</div>
      <div class="logo-sub">Равлика</div>
    </div>
  </div>

  <span class="sect-lbl" aria-hidden="true">Команди</span>

  <div class="palette" id="palette" role="group" aria-label="Команди для равлика"></div>

  <div class="div-line" aria-hidden="true"></div>

  <div class="actions">
    <button class="icon-btn btn-run" id="btn-run" aria-label="Запустити алгоритм" title="Запустити" type="button">
      <img class="icon-btn-img" src="assets/run_button.svg" alt="" aria-hidden="true">
    </button>
    <button class="icon-btn btn-clr" id="btn-clr" aria-label="Очистити поле" title="Очистити" type="button">
      <img class="icon-btn-img icon-btn-trash" src="assets/trash_icon.svg" alt="" aria-hidden="true">
    </button>
  </div>
</aside>

<main class="grid-area" id="main-content" tabindex="-1" aria-label="Ігрове поле 8 на 6">
  <div class="level-bar" aria-label="Поточний рівень">
    <div class="level-meta">
      <span class="level-chip" id="level-chip">Рівень 1 з 20</span>
      <h1 class="level-title" id="level-title">Пряма доріжка</h1>
    </div>
    <div class="level-nav" aria-label="Навігація рівнями">
      <button class="level-nav-btn" id="btn-prev" type="button" aria-label="Попередній рівень" title="Попередній рівень">
        <img class="level-nav-icon" src="assets/prev_level.svg" alt="" aria-hidden="true">
      </button>
      <button class="level-nav-btn" id="btn-next" type="button" aria-label="Наступний рівень" title="Наступний рівень">
        <img class="level-nav-icon" src="assets/next_level.svg" alt="" aria-hidden="true">
      </button>
    </div>
  </div>

  <section class="level-toolbar" aria-label="Прогрес гри">
    <div class="progress-box" aria-live="polite">
      <div class="progress-copy">
        <span class="progress-label">Прогрес</span>
        <strong class="progress-text" id="progress-text">Пройдено 0 з 20 рівнів</strong>
      </div>
      <div class="progress-track" id="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Прогрес проходження">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="info-btn" id="btn-level-info" type="button">Завдання</button>
      <button class="speak-btn" id="btn-speak-task" type="button" aria-label="Озвучити завдання" title="Озвучити завдання">&#128266; Слухати</button>
      <button class="map-btn" id="btn-map" type="button">Карта рівнів</button>
    </div>
  </section>

  <div class="gwrap" id="gwrap">
    <div id="grid" role="grid" aria-label="Поле 8 на 6. Тут можна ставити команди для маршруту."></div>
    <div id="snail" aria-hidden="true"></div>
  </div>
  <div id="status" role="status" aria-live="polite" aria-atomic="true">
    <span id="sico" aria-hidden="true">&#128161;</span>
    <span id="stxt">Тягни команди на поле - равлик піде по них!</span>
  </div>
</main>

<section class="level-card level-intro-source" id="level-intro-content" aria-label="Опис рівня" hidden>
  <div class="level-badges">
    <span class="mode-chip" id="level-mode">Звичайний рівень</span>
    <span class="goal-chip" id="level-goal">Навчитися рухатися праворуч.</span>
  </div>
  <p class="level-hint" id="level-hint">Постав стрілочки праворуч, щоб равлик дійшов до яблука.</p>
  <p class="debug-note" id="debug-note" hidden></p>
</section>

<noscript>
  <section class="level-card" aria-label="Повідомлення без JavaScript">
    <p>Для цієї гри потрібен JavaScript. Увімкніть його, щоб керувати равликом і проходити рівні.</p>
  </section>
</noscript>

<div id="ghost" aria-hidden="true"></div>
<div id="confetti" aria-hidden="true"></div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
