<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- Content Security Policy: allow only same-origin resources; no inline scripts/styles -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; media-src 'self'; connect-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'">
    <!-- Restrict access to sensitive browser APIs not needed by this game -->
    <meta http-equiv="Permissions-Policy"
        content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()">
    <meta name="theme-color" content="">
    <title data-i18n-title="meta.title"></title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/entities.css">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/tasks.css">
</head>

<body>
    <a href="#game-area" class="skip-link" data-i18n="app.skipLink"></a>
    <h1 class="sr-only" data-i18n="app.heading"></h1>

    <div id="viewport" data-i18n-aria-label="app.viewportLabel">
        <div id="game-area" data-i18n-aria-label="app.gameAreaLabel">
            <div id="obstacles-container"></div>
            <div id="items-container"></div>
            <div id="npcs-container"></div>

            <div id="keyboard-cursor" role="presentation" aria-hidden="true">
                <div class="cursor-crosshair"></div>
            </div>

            <div id="player-wrapper">
                <div id="player-inner" class="is-idle">
                    <div class="eyestalk left" aria-hidden="true"></div>
                    <div class="eyestalk right" aria-hidden="true"></div>
                    <div class="snail-body" aria-hidden="true"></div>
                    <div class="snail-shell" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-layer" role="status" aria-live="polite" aria-atomic="true" data-game-interactive>
        <section id="hud-panel" class="hud-panel" data-i18n-aria-label="app.heading">

            <!-- ① Always-visible row: counters + setting buttons -->
            <div class="hud-topbar">
                <div class="hud-stats" data-i18n-aria-label="hud.statsLabel">
                    <article class="hud-stat hud-stat--apples">
                        <span class="hud-stat__icon" aria-hidden="true">🍎</span>
                        <span class="hud-stat__label" data-i18n="hud.applesLabel"></span>
                        <strong id="apples-count" class="hud-stat__value">0</strong>
                    </article>
                    <article class="hud-stat hud-stat--stars">
                        <span class="hud-stat__icon" aria-hidden="true">★</span>
                        <span class="hud-stat__label" data-i18n="hud.starsLabel"></span>
                        <strong id="stars-count" class="hud-stat__value">0</strong>
                    </article>
                </div>
                <div class="hud-actions" data-i18n-aria-label="hud.settingsLabel">
                    <button id="font-toggle-btn" class="hud-action-btn" type="button"
                        data-i18n="hud.fontToggle" data-i18n-aria-label="hud.fontToggleLabel"></button>
                    <button id="theme-toggle-btn" class="hud-action-btn" type="button"
                        data-i18n="hud.themeToggleDark" data-i18n-aria-label="hud.themeToggleLabel"></button>
                    <button id="music-toggle-btn" class="hud-action-btn" type="button"
                        data-i18n="hud.musicToggle" data-i18n-aria-label="hud.musicToggleLabel"></button>
                    <button id="pause-btn" class="hud-action-btn" type="button"
                        data-i18n="hud.pauseBtn" data-i18n-aria-label="hud.pauseBtnLabel"></button>
                </div>
            </div>

            <!-- ② NPC proximity badge — always in DOM, shown/hidden by JS -->
            <div class="hud-npc-row">
                <span id="hud-npc-badge" class="hud-badge hud-badge--soft hidden"></span>
            </div>

            <!-- ③ Expand / collapse handle -->
            <button id="hud-toggle-btn" class="hud-toggle-btn" type="button" aria-expanded="false"
                data-i18n-aria-label="hud.toggleDetailsLabel">
                <span class="hud-toggle-btn__grip" aria-hidden="true"></span>
            </button>

            <!-- ④ Collapsible details: objective hint -->
            <div id="hud-details" class="hud-details">
                <!-- Session summary: sr-only (stats visible in topbar) -->
                <div class="sr-only">
                    <p id="hud-session-label" data-i18n="hud.sessionLabel"></p>
                    <p id="hud-session" data-i18n="hud.sessionStatusDefault"></p>
                </div>

                <!-- Main objective -->
                <div class="hud-message hud-message--primary">
                    <p id="hud-objective-label" class="hud-message__label" data-i18n="hud.objectiveLabel"></p>
                    <p id="hud-objective" class="hud-message__text" data-i18n="hud.objectiveText"></p>
                </div>

                <!-- Context: sr-only — NPC badge above is the visual cue; this text feeds aria-live -->
                <p id="hud-context" class="sr-only" data-i18n="hud.contextIdle"></p>

                <div class="hud-footer">
                    <div id="score-display" class="sr-only" data-i18n="score.display"
                        data-i18n-aria-label="app.scoreLabel"></div>
                    <p id="controls-hint" class="sr-only" data-i18n="app.controlsHint"
                        data-i18n-aria-label="app.controlsLabel"></p>
                    <div id="keyboard-mode-indicator" class="hud-badge hidden" aria-live="assertive"
                        data-i18n="app.keyboardMode"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="dialog-layer" role="dialog" aria-modal="true" aria-labelledby="dialog-title" aria-describedby="dialog-text"
        aria-hidden="true" style="display: none;" data-game-interactive>
        <div class="dialog-box">
            <h2 id="dialog-title" class="dialog-title" data-i18n="app.dialogTitleFallback"></h2>
            <p id="dialog-text" class="dialog-text" data-i18n="app.dialogTextFallback"></p>
            <div id="dialog-content" class="dialog-content"></div>
            <p id="dialog-status" class="dialog-status" aria-live="polite"></p>
            <div class="dialog-actions">
                <button id="dialog-btn" class="dialog-btn dialog-btn--primary" type="button" data-i18n="app.dialogButtonFallback"></button>
            </div>
        </div>
    </div>

    <div id="announcements" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="game-state-description" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="js/main.js"></script>
    <!-- Frame-busting: redirect to top if this page is embedded in an iframe.
         Cannot rely on CSP frame-ancestors via meta tag (only HTTP headers enforce it).
         This JS defence is the practical mitigation for GitHub Pages deployments. -->
    <script src="js/frame-guard.js"></script>
</body>

</html>
