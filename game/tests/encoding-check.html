<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка кодування</title>
    <link rel="stylesheet" href="../tokens.css">
    <style>
        body {
            margin: 0;
            padding: var(--space-6);
            background: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-family-base);
        }

        .card {
            max-width: 56rem;
            margin: 0 auto;
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-2);
            padding: var(--space-6);
        }

        .pass {
            color: var(--color-success);
        }

        .fail {
            color: var(--color-error);
        }

        li {
            margin-bottom: var(--space-2);
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Перевірка українського кодування</h1>
        <p id="encoding-summary">Виконуємо перевірку…</p>
        <ul id="encoding-results"></ul>
    </main>

    <script type="module" src="./encoding-check.js"></script>
</body>

</html>
