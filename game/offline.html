<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Немає мережі</title>
    <link rel="stylesheet" href="tokens.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: var(--space-6);
            background: linear-gradient(180deg, var(--color-grass-light), var(--color-grass-dark));
            color: var(--color-text);
            font-family: var(--font-family-base);
        }

        .offline-card {
            width: min(100%, 32rem);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-3);
            padding: var(--space-6);
            text-align: left;
        }

        h1 {
            margin: 0 0 var(--space-3);
            font-size: var(--font-size-2xl);
        }

        p {
            margin: 0 0 var(--space-3);
            line-height: 1.6;
        }

        a {
            color: var(--color-primary);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <main class="offline-card">
        <h1>Зараз немає мережі</h1>
        <p>Якщо гру вже відкривали на цьому пристрої, повернись на попередню сторінку або спробуй відкрити її ще раз.</p>
        <p>Коли інтернет з’явиться, <a href="./index.html">запусти нову гру</a>.</p>
    </main>
</body>

</html>
